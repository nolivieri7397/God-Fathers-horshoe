<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Godfathers Horseshoe Tournament</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#c9a84c;font-family:'Crimson Text',serif;min-height:100vh}
.page{max-width:1400px;margin:0 auto;padding:20px}
header{text-align:center;padding:24px 0 16px;border-bottom:1px solid #2a1f05}
.title-main{font-family:'Cinzel',serif;font-size:38px;font-weight:700;color:#c9a84c;letter-spacing:4px}
.title-sub{font-family:'Cinzel',serif;font-size:11px;letter-spacing:6px;color:#5a4020;margin-top:4px}
.divider{width:180px;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:10px auto}
.tabs{display:flex;gap:0;margin:20px 0 0;border-bottom:1px solid #2a1f05}
.tab{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;padding:9px 22px;cursor:pointer;border:1px solid transparent;border-bottom:none;color:#5a4020;transition:all .2s}
.tab.active{color:#c9a84c;border-color:#2a1f05;border-bottom-color:#0a0a0a;background:#0d0b04}
.tab:hover:not(.active){color:#a8883c}
.panel{display:none;padding:20px 0}.panel.active{display:block}
.sec{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:#5a4020;margin-bottom:14px}
.row{display:flex;gap:8px;margin-bottom:14px}
input[type=text]{background:#0d0b04;border:1px solid #2a1f05;color:#c9a84c;font-family:'Crimson Text',serif;font-size:16px;padding:7px 11px;flex:1;outline:none;transition:border .2s}
input[type=text]:focus{border-color:#7a6030}
input[type=text]::placeholder{color:#2a1f05}
.btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:7px 18px;cursor:pointer;border:1px solid #c9a84c;background:transparent;color:#c9a84c;transition:all .2s;white-space:nowrap}
.btn:hover{background:#c9a84c;color:#0a0a0a}
.btn.sb{border-color:#2a1f05;color:#5a4020}.btn.sb:hover{border-color:#5a4020;color:#a8883c;background:transparent}
.btn.rb{border-color:#4a1a1a;color:#7a3030}.btn.rb:hover{background:#4a1a1a;color:#c9a84c}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;min-height:28px}
.tag{display:flex;align-items:center;gap:5px;background:#0d0b04;border:1px solid #2a1f05;padding:3px 9px;font-size:14px;color:#a8883c}
.tag button{background:none;border:none;color:#3a2a0a;cursor:pointer;font-size:15px;line-height:1;padding:0}.tag button:hover{color:#c9a84c}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:14px}
.team-card{background:#0d0b04;border:1px solid #2a1f05;padding:9px 12px}
.tc-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:#5a4020;margin-bottom:4px}
.tc-names{font-size:14px;color:#c9a84c}
.fmt-opts{display:flex;gap:10px;margin-bottom:18px}
.fmt-btn{flex:1;padding:12px;border:1px solid #2a1f05;background:#0d0b04;color:#5a4020;cursor:pointer;text-align:center;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;transition:all .2s}
.fmt-btn.sel{border-color:#c9a84c;color:#c9a84c;background:#140f00}
.fmt-btn:hover:not(.sel){border-color:#3a2a0a;color:#a8883c}
.err{font-size:14px;color:#7a3030;font-style:italic}
#champ-banner{display:none;text-align:center;padding:24px;border:1px solid #c9a84c;margin-bottom:20px;background:#0d0b04}
#champ-banner.show{display:block}
.cb-lbl{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;color:#5a4020}
.cb-name{font-family:'Cinzel',serif;font-size:28px;color:#c9a84c;margin:6px 0}
.cb-sub{font-size:14px;color:#5a4020;font-style:italic}
.bwrap{overflow:auto;padding:10px 0}
</style>
</head>
<body>
<div class="page">
<header>
  <div class="title-main">THE GODFATHERS</div>
  <div class="divider"></div>
  <div class="title-sub">HORSESHOE TOURNAMENT</div>
</header>
<div class="tabs">
  <div class="tab active" onclick="showTab('setup')">I. Setup</div>
  <div class="tab" onclick="showTab('teams')">II. Teams</div>
  <div class="tab" onclick="showTab('bracket')">III. Bracket</div>
</div>

<div id="panel-setup" class="panel active">
  <div class="sec">Add Players</div>
  <div class="row">
    <input type="text" id="pinp" placeholder="Player name..." onkeydown="if(event.key==='Enter')addP()">
    <button class="btn" onclick="addP()">Add</button>
  </div>
  <div class="tags" id="ptags"></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">
    <button class="btn sb" onclick="loadSample(4)">4 Sample Teams</button>
    <button class="btn sb" onclick="loadSample(8)">8 Sample Teams</button>
    <button class="btn rb" onclick="clearP()">Clear All</button>
  </div>
  <div class="sec">Format</div>
  <div class="fmt-opts">
    <div class="fmt-btn sel" id="fmt-single" onclick="setFmt('single')">Single<br>Elimination</div>
    <div class="fmt-btn" id="fmt-double" onclick="setFmt('double')">Double<br>Elimination</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="btn" onclick="goTeams()">Continue to Teams →</button>
    <span class="err" id="smsg"></span>
  </div>
</div>

<div id="panel-teams" class="panel">
  <div class="sec">Teams</div>
  <div class="teams-grid" id="tgrid"></div>
  <div style="display:flex;gap:10px;align-items:center;margin-top:6px">
    <button class="btn sb" onclick="shuffleTeams()">↺ Re-randomize</button>
    <button class="btn" onclick="genBracket()">Generate Bracket →</button>
    <span class="err" id="tmsg"></span>
  </div>
</div>

<div id="panel-bracket" class="panel">
  <div id="champ-banner">
    <div class="cb-lbl">Champion</div>
    <div class="cb-name" id="cname"></div>
    <div class="cb-sub">An offer they couldn't refuse.</div>
  </div>
  <div id="bcont"></div>
</div>
</div>

<script>
// ─── globals ────────────────────────────────────────────────────────────────
let players=[], teams=[], fmt='single';
// Match store: id -> {id, t1, t2, winner, loser, s1, s2}
let M={}, mSeq=0;

function newMatch(t1,t2){
  const id=++mSeq;
  M[id]={id,t1:t1||null,t2:t2||null,winner:null,loser:null,s1:'',s2:''};
  if(M[id].t1&&!M[id].t2){M[id].winner=M[id].t1;}
  if(M[id].t2&&!M[id].t1){M[id].winner=M[id].t2;}
  return M[id];
}

// ─── tabs ────────────────────────────────────────────────────────────────────
function showTab(t){
  ['setup','teams','bracket'].forEach((p,i)=>{
    document.getElementById('panel-'+p).classList.toggle('active',p===t);
    document.querySelectorAll('.tab')[i].classList.toggle('active',p===t);
  });
}

// ─── players ─────────────────────────────────────────────────────────────────
function addP(){
  const el=document.getElementById('pinp'),n=el.value.trim();
  if(!n||players.includes(n))return;
  players.push(n);el.value='';renderP();
}
function removeP(i){players.splice(i,1);renderP();}
function renderP(){
  document.getElementById('ptags').innerHTML=
    players.map((p,i)=>`<div class="tag">${p}<button onclick="removeP(${i})">×</button></div>`).join('');
}
function clearP(){players=[];renderP();}
function loadSample(n){
  const names=['Vito','Michael','Sonny','Fredo','Tom','Carlo','Luca','Peter','Sal','Neri','Clemenza','Barzini','Tattaglia','Virgil','Calo','Enzo'];
  players=names.slice(0,n*2);renderP();
}
function setFmt(f){
  fmt=f;
  ['single','double'].forEach(x=>document.getElementById('fmt-'+x).classList.toggle('sel',x===f));
}
function goTeams(){
  const msg=document.getElementById('smsg');
  if(players.length<4){msg.textContent='Need at least 4 players (2 teams).';return;}
  if(players.length%2!==0){msg.textContent='Need an even number of players.';return;}
  msg.textContent='';shuffleTeams();showTab('teams');
}
function shuffleTeams(){
  const s=[...players].sort(()=>Math.random()-.5);
  teams=[];
  for(let i=0;i<s.length;i+=2) teams.push({p1:s[i],p2:s[i+1]});
  renderTeams();
}
function renderTeams(){
  document.getElementById('tgrid').innerHTML=teams.map((t,i)=>
    `<div class="team-card"><div class="tc-label">Team ${i+1}</div><div class="tc-names">${t.p1} &amp; ${t.p2}</div></div>`
  ).join('');
}
function genBracket(){
  M={};mSeq=0;
  if(fmt==='double') buildDE();
  else buildSE();
}

// ─── helpers ─────────────────────────────────────────────────────────────────
function tLabel(t){return t?`${t.p1} & ${t.p2}`:null;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tr(s,n){return s&&s.length>n?s.slice(0,n-1)+'…':s;}
function seedOf(t){return t?teams.indexOf(t)+1:null;}
function setChamp(t){
  if(t){document.getElementById('cname').textContent=tLabel(t);document.getElementById('champ-banner').classList.add('show');}
  else document.getElementById('champ-banner').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════════════════════════
// SVG PRIMITIVES
// ═══════════════════════════════════════════════════════════════════════════════
const BG='#0d0b04', BG_WIN='#1a1200', STR='#2a1f05', STR_WIN='#c9a84c';
const C_WIN='#c9a84c', C_TEAM='#a8883c', C_EMPTY='#2a1f05', C_SEED='#5a4020', C_NUM='#3a2a0a';

// Draw a match box at (x,y) with width w, height h (total for both slots)
// Returns SVG string
function matchBox(m, x, y, w, h, clickFn){
  const slotH=h/2;
  const t1=tLabel(m.t1), t2=tLabel(m.t2);
  const w1=m.winner&&m.winner===m.t1, w2=m.winner&&m.winner===m.t2;
  const hasBoth=m.t1&&m.t2;
  const s1=seedOf(m.t1), s2=seedOf(m.t2);
  let o='';
  // Match number above top-left
  o+=`<text x="${x+2}" y="${y-3}" fill="${C_NUM}" font-family="Cinzel,serif" font-size="9">${m.id}</text>`;
  // Top slot
  o+=`<g style="cursor:${hasBoth?'pointer':'default'}" onclick="${hasBoth?`${clickFn}(${m.id},1)`:''}">`;
  o+=`<rect x="${x}" y="${y}" width="${w}" height="${slotH}" fill="${w1?BG_WIN:BG}" stroke="${w1?STR_WIN:STR}" stroke-width="${w1?1.5:1}"/>`;
  if(s1) o+=`<text x="${x+5}" y="${y+slotH/2}" dominant-baseline="middle" fill="${C_SEED}" font-family="Cinzel,serif" font-size="10" font-weight="600">${s1}</text>`;
  const d1=t1?esc(tr(t1,22)):`<tspan font-style="italic" fill="${C_EMPTY}">${m.lbl1||'—'}</tspan>`;
  o+=`<text x="${x+(s1?18:8)}" y="${y+slotH/2}" dominant-baseline="middle" fill="${w1?C_WIN:hasBoth?C_TEAM:C_EMPTY}" font-size="13">${d1}</text>`;
  o+='</g>';
  // Divider
  o+=`<line x1="${x}" y1="${y+slotH}" x2="${x+w}" y2="${y+slotH}" stroke="#1a1200" stroke-width="1"/>`;
  // Bottom slot
  o+=`<g style="cursor:${hasBoth?'pointer':'default'}" onclick="${hasBoth?`${clickFn}(${m.id},2)`:''}">`;
  o+=`<rect x="${x}" y="${y+slotH}" width="${w}" height="${slotH}" fill="${w2?BG_WIN:BG}" stroke="${w2?STR_WIN:STR}" stroke-width="${w2?1.5:1}"/>`;
  if(s2) o+=`<text x="${x+5}" y="${y+slotH*1.5}" dominant-baseline="middle" fill="${C_SEED}" font-family="Cinzel,serif" font-size="10" font-weight="600">${s2}</text>`;
  const d2=t2?esc(tr(t2,22)):`<tspan font-style="italic" fill="${C_EMPTY}">${m.lbl2||'—'}</tspan>`;
  o+=`<text x="${x+(s2?18:8)}" y="${y+slotH*1.5}" dominant-baseline="middle" fill="${w2?C_WIN:hasBoth?C_TEAM:C_EMPTY}" font-size="13">${d2}</text>`;
  o+='</g>';
  return o;
}

// L-shaped connector: exit right side of (x1,y1), arrive left side of (x2,y2)
function conn(x1,y1,x2,y2,color){
  color=color||STR;
  const mid=(x1+x2)/2;
  return `<polyline points="${x1},${y1} ${mid},${y1} ${mid},${y2} ${x2},${y2}" fill="none" stroke="${color}" stroke-width="1.5"/>`;
}
// Simple horizontal line
function hline(x1,x2,y,color){
  return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${color||STR}" stroke-width="1.5"/>`;
}
// Section label
function secLabel(text,x,y){
  return `<text x="${x}" y="${y}" fill="#5a4020" font-family="Cinzel,serif" font-size="10" letter-spacing="3">${text}</text>`;
}
// Round label centered above column
function rdLabel(text,x,w,y){
  return `<text x="${x+w/2}" y="${y}" text-anchor="middle" fill="#2a1f05" font-family="Cinzel,serif" font-size="9" letter-spacing="2">${text}</text>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// SINGLE ELIMINATION
// ═══════════════════════════════════════════════════════════════════════════════
function buildSE(){
  const n=teams.length;
  const nRounds=Math.ceil(Math.log2(n));
  const size=Math.pow(2,nRounds);
  // Seed with byes
  const seeded=[...teams]; while(seeded.length<size) seeded.push(null);

  // Build round 0
  const rounds=[[]];
  for(let i=0;i<size;i+=2){
    const m=newMatch(seeded[i],seeded[i+1]);
    rounds[0].push(m);
  }
  // Build subsequent rounds
  for(let r=1;r<nRounds;r++){
    const prev=rounds[r-1],cur=[];
    for(let i=0;i<prev.length;i+=2){
      const m=newMatch(null,null);
      m.src=[prev[i].id, prev[i+1]?prev[i+1].id:null];
      m.lbl1=`Winner of ${prev[i].id}`;
      m.lbl2=prev[i+1]?`Winner of ${prev[i+1].id}`:'—';
      cur.push(m);
    }
    rounds.push(cur);
  }
  propagateSE(rounds);
  showTab('bracket');
  renderSE(rounds);
}

function propagateSE(rounds){
  for(let r=1;r<rounds.length;r++){
    rounds[r].forEach((m,mi)=>{
      const [id1,id2]=m.src||[];
      const s1=id1?M[id1]:null, s2=id2?M[id2]:null;
      m.t1=s1?s1.winner:null;
      m.t2=s2?s2.winner:null;
      if(m.winner&&m.winner!==m.t1&&m.winner!==m.t2) m.winner=null;
      if(m.t1&&!m.t2) m.winner=m.t1;
      if(m.t2&&!m.t1) m.winner=m.t2;
    });
  }
}

function clickSE(id,side){
  const m=M[id];
  if(!m||!m.t1||!m.t2) return;
  m.winner=side===1?m.t1:m.t2;
  // find which rounds array — re-derive from stored structure
  propagateSE(window._seRounds);
  renderSE(window._seRounds);
}

function renderSE(rounds){
  window._seRounds=rounds;
  const MW=180,MH=64,HGAP=70,TOP=50,LEFT=30;
  const nRounds=rounds.length;
  const nSlots=rounds[0].length;
  const slotH=MH+32;
  const svgH=TOP+nSlots*slotH+40;
  const svgW=LEFT+nRounds*(MW+HGAP)+120;
  let o='';

  // Round labels
  const rdNames=getRoundNames(nRounds);
  rounds.forEach((rd,ri)=>{
    const x=LEFT+ri*(MW+HGAP);
    o+=rdLabel(rdNames[ri],x,MW,TOP-18);
  });

  rounds.forEach((rd,ri)=>{
    const x=LEFT+ri*(MW+HGAP);
    const span=Math.pow(2,ri);
    rd.forEach((m,mi)=>{
      const cy=TOP+(mi*span*2+span)*slotH;
      const y=cy-MH/2;
      o+=matchBox(m,x,y,MW,MH,'clickSE');
      if(ri<nRounds-1){
        const nspan=Math.pow(2,ri+1);
        const ncy=TOP+(Math.floor(mi/2)*nspan*2+nspan)*slotH;
        o+=conn(x+MW,cy,x+MW+HGAP,ncy);
      }
    });
  });

  // Champion
  const fin=rounds[nRounds-1][0];
  const finSpan=Math.pow(2,nRounds-1);
  const finCy=TOP+(finSpan)*slotH;
  const finX=LEFT+(nRounds-1)*(MW+HGAP)+MW;
  if(fin.winner){
    o+=hline(finX,finX+30,finCy,C_WIN);
    o+=`<text x="${finX+36}" y="${finCy}" dominant-baseline="middle" fill="${C_WIN}" font-family="Cinzel,serif" font-size="11" letter-spacing="2">CHAMPION</text>`;
  }

  document.getElementById('bcont').innerHTML=
    `<div class="bwrap"><svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">${o}</svg></div>`;
  setChamp(fin.winner);
}

function getRoundNames(n){
  const names=[];
  for(let i=0;i<n;i++){
    const rem=n-i;
    if(rem===1) names.push('FINAL');
    else if(rem===2) names.push('SEMIFINAL');
    else if(rem===3) names.push('QUARTERFINAL');
    else names.push(`ROUND ${i+1}`);
  }
  return names;
}

// ═══════════════════════════════════════════════════════════════════════════════
// DOUBLE ELIMINATION
// ═══════════════════════════════════════════════════════════════════════════════
// Structure mirrors the screenshot exactly:
// WB: standard single-elim bracket, seeded
// LB: interleaved drop-in + consolidation rounds
// Grand Final: WB winner vs LB winner, with "if necessary" game 2
//
// For N teams (power of 2):
//   WB has log2(N) rounds
//   LB has 2*(log2(N)-1) rounds
//   GF has 1 match (+ optional game 2)
//
// LB seeding (matching screenshot for 4 teams / 8 teams):
//   LB R1 (drop-in): losers from WB R1, paired cross-bracket
//   LB R2 (consolidation): LB R1 winners vs each other
//   LB R3 (drop-in): LB R2 winner vs WB R2 loser
//   ... etc

let _de={};

function buildDE(){
  _de={};
  const n=teams.length;
  const nWBR=Math.ceil(Math.log2(n));
  const size=Math.pow(2,nWBR);
  const seeded=[...teams]; while(seeded.length<size) seeded.push(null);

  // ── WB ──────────────────────────────────────────────────────────
  _de.wbRounds=[];
  // WB R1
  const wbR0=[];
  for(let i=0;i<size;i+=2){
    const m=newMatch(seeded[i],seeded[i+1]);
    wbR0.push(m);
  }
  _de.wbRounds.push(wbR0);
  for(let r=1;r<nWBR;r++){
    const prev=_de.wbRounds[r-1],cur=[];
    for(let i=0;i<prev.length;i+=2){
      const m=newMatch(null,null);
      m.src=[prev[i].id,prev[i+1]?prev[i+1].id:null];
      m.lbl1=`Winner of ${prev[i].id}`;
      m.lbl2=prev[i+1]?`Winner of ${prev[i+1].id}`:'—';
      cur.push(m);
    }
    _de.wbRounds.push(cur);
  }

  // ── LB ──────────────────────────────────────────────────────────
  // LB has 2*(nWBR-1) rounds total
  // Odd rounds (0-indexed even): drop-in from WB
  // Even rounds (0-indexed odd): consolidation
  _de.lbRounds=[];
  const nLBR=2*(nWBR-1);

  for(let r=0;r<nLBR;r++){
    // Number of matches in this LB round
    // LB R1: size/4 matches (pairs of WB R1 losers)
    // LB R2: size/4 matches (consolidation)
    // LB R3: size/8 matches (drop-in from WB R2)
    // LB R4: size/8 (consolidation)
    // etc.
    const cnt=Math.max(1, size / Math.pow(2, Math.floor(r/2)+2));
    const rd=[];
    for(let i=0;i<cnt;i++){
      const m=newMatch(null,null);
      m.lbRound=r;
      rd.push(m);
    }
    _de.lbRounds.push(rd);
  }

  // GF
  _de.gf=newMatch(null,null);
  _de.gf.lbl1='Winner of WB';
  _de.gf.lbl2='Winner of LB';
  _de.gf2=newMatch(null,null); // if necessary
  _de.gf2.lbl1='Winner of GF1';
  _de.gf2.lbl2='Loser of GF1';
  _de.nWBR=nWBR;

  propagateDE();
  showTab('bracket');
  renderDE();
}

function propagateDE(){
  const{wbRounds,lbRounds,gf,gf2,nWBR}=_de;
  const size=Math.pow(2,nWBR);

  // Propagate WB
  for(let r=1;r<wbRounds.length;r++){
    wbRounds[r].forEach((m)=>{
      const [id1,id2]=m.src||[];
      const s1=id1?M[id1]:null,s2=id2?M[id2]:null;
      const nt1=s1?s1.winner:null,nt2=s2?s2.winner:null;
      if(m.winner&&(m.winner!==nt1&&m.winner!==nt2)) m.winner=null;
      m.t1=nt1;m.t2=nt2;
      if(m.t1&&!m.t2)m.winner=m.t1;
      if(m.t2&&!m.t1)m.winner=m.t2;
      if(m.winner)m.loser=m.winner===m.t1?m.t2:m.t1;
    });
  }

  // Feed WB losers into LB
  // WB R1 losers → LB R1: pair them cross-bracket style
  // For 4 teams (size=4): WB R1 has 2 matches → LB R1 has 1 match
  //   LB R1[0].t1 = loser of WB R1[1], LB R1[0].t2 = loser of WB R1[0]  (cross-seeded)
  // For 8 teams (size=8): WB R1 has 4 matches → LB R1 has 2 matches
  //   LB R1[0].t1 = loser WBR1[2], t2 = loser WBR1[1]
  //   LB R1[1].t1 = loser WBR1[3], t2 = loser WBR1[0]  (cross pattern)
  const wbR1=wbRounds[0];
  const lbR1=lbRounds[0];
  const half=wbR1.length/2;
  lbR1.forEach((m,i)=>{
    m.t1=wbR1[half+i]?wbR1[half+i].loser:null;
    m.t2=wbR1[i]?wbR1[i].loser:null;
    m.lbl1=`Loser of ${wbR1[half+i]?wbR1[half+i].id:'?'}`;
    m.lbl2=`Loser of ${wbR1[i]?wbR1[i].id:'?'}`;
    if(m.winner&&(m.winner!==m.t1&&m.winner!==m.t2))m.winner=null;
    if(m.t1&&!m.t2)m.winner=m.t1;
    if(m.t2&&!m.t1)m.winner=m.t2;
    if(m.winner)m.loser=null;
  });

  // Propagate remaining LB rounds
  for(let r=1;r<lbRounds.length;r++){
    const rd=lbRounds[r];
    const prev=lbRounds[r-1];
    const isDropIn=(r%2===0); // 0-indexed: r=0 drop-in, r=1 consol, r=2 drop-in...
    // Actually r=0→drop-in, r=1→consol, r=2→drop-in, r=3→consol
    // drop-in rounds: r%2===0
    // consol rounds: r%2===1
    if(r%2===1){
      // Consolidation: t1 from prev LB winner, t2 from WB drop-in
      const wbDropRound=wbRounds[Math.floor(r/2)+1];
      rd.forEach((m,i)=>{
        m.t1=prev[i]?prev[i].winner:null;
        m.t2=wbDropRound&&wbDropRound[i]?wbDropRound[i].loser:null;
        m.lbl1=prev[i]?`Winner of ${prev[i].id}`:'—';
        m.lbl2=wbDropRound&&wbDropRound[i]?`Loser of ${wbDropRound[i].id}`:'—';
        if(m.winner&&(m.winner!==m.t1&&m.winner!==m.t2))m.winner=null;
        if(m.t1&&!m.t2)m.winner=m.t1;
        if(m.t2&&!m.t1)m.winner=m.t2;
        if(m.winner)m.loser=null;
      });
    } else {
      // Consolidation (even r>0): both from prev LB winners
      rd.forEach((m,i)=>{
        const s1=prev[i*2], s2=prev[i*2+1];
        m.t1=s1?s1.winner:null;
        m.t2=s2?s2.winner:null;
        m.lbl1=s1?`Winner of ${s1.id}`:'—';
        m.lbl2=s2?`Winner of ${s2.id}`:'—';
        if(m.winner&&(m.winner!==m.t1&&m.winner!==m.t2))m.winner=null;
        if(m.t1&&!m.t2)m.winner=m.t1;
        if(m.t2&&!m.t1)m.winner=m.t2;
        if(m.winner)m.loser=null;
      });
    }
  }

  // GF
  const wbFin=wbRounds[wbRounds.length-1][0];
  const lbFin=lbRounds[lbRounds.length-1][0];
  gf.t1=wbFin.winner;
  gf.t2=lbFin.winner;
  gf.lbl1=`Winner of ${wbFin.id}`;
  gf.lbl2=`Winner of ${lbFin.id}`;
  if(gf.winner&&(gf.winner!==gf.t1&&gf.winner!==gf.t2))gf.winner=null;
  if(gf.t1&&!gf.t2)gf.winner=gf.t1;
  if(gf.t2&&!gf.t1)gf.winner=gf.t2;

  // GF2 (if necessary)
  gf2.t1=gf.winner;
  gf2.t2=gf.winner?(gf.winner===gf.t1?gf.t2:gf.t1):null;
  if(gf2.winner&&(gf2.winner!==gf2.t1&&gf2.winner!==gf2.t2))gf2.winner=null;

  _de.champion=gf2.winner||gf.winner;
}

function clickDE(id,side){
  const m=M[id];
  if(!m||!m.t1||!m.t2)return;
  m.winner=side===1?m.t1:m.t2;
  m.loser=side===1?m.t2:m.t1;
  propagateDE();
  renderDE();
}

function renderDE(){
  const{wbRounds,lbRounds,gf,gf2,nWBR}=_de;
  // Layout
  const MW=175, MH=60, HGAP=65, VPAD=14;
  const TOP_WB=48, LEFT=30;

  const nWB=wbRounds.length, nLB=lbRounds.length;
  const wbSlots=wbRounds[0].length;
  const slotH=MH+VPAD*2; // height of one "slot" row in WB

  const wbH=wbSlots*slotH;
  const wbBottom=TOP_WB+wbH;
  const lbTop=wbBottom+60;
  const lbSlots=Math.max(...lbRounds.map(r=>r.length));
  const lbSlotH=MH+VPAD*2;
  const lbH=lbSlots*lbSlotH;

  // GF sits to the right, vertically centered between WB and LB
  const gfCol=LEFT+Math.max(nWB,nLB)*(MW+HGAP);
  const gfCy=(TOP_WB+wbH/2+lbTop+lbH/2)/2;

  const svgW=gfCol+MW+180;
  const svgH=lbTop+lbH+40;

  let o='';

  // ── WB ──────────────────────────────────────────────────────────
  o+=secLabel('WINNERS BRACKET', LEFT, TOP_WB-20);
  const wbRdNames=getRoundNames(nWB);
  wbRounds.forEach((rd,ri)=>{
    const x=LEFT+ri*(MW+HGAP);
    o+=rdLabel(wbRdNames[ri],x,MW,TOP_WB-6);
    const span=Math.pow(2,ri);
    rd.forEach((m,mi)=>{
      const cy=TOP_WB+(mi*span*2+span)*slotH;
      const y=cy-MH/2;
      o+=matchBox(m,x,y,MW,MH,'clickDE');
      if(ri<nWB-1){
        const nspan=Math.pow(2,ri+1);
        const ncy=TOP_WB+(Math.floor(mi/2)*nspan*2+nspan)*slotH;
        o+=conn(x+MW,cy,x+MW+HGAP,ncy);
      }
    });
  });

  // ── LB ──────────────────────────────────────────────────────────
  o+=secLabel('LOSERS BRACKET', LEFT, lbTop-10);
  lbRounds.forEach((rd,ri)=>{
    const x=LEFT+ri*(MW+HGAP);
    o+=rdLabel(`LB R${ri+1}`,x,MW,lbTop+2);
    const spacing=lbH/rd.length;
    rd.forEach((m,mi)=>{
      const cy=lbTop+16+mi*spacing+spacing/2;
      const y=cy-MH/2;
      o+=matchBox(m,x,y,MW,MH,'clickDE');
      if(ri<nLB-1){
        const nextRd=lbRounds[ri+1];
        const nSpacing=lbH/nextRd.length;
        // which slot does this winner feed?
        let nmi;
        if(ri%2===0){
          // consolidation feeds: winners pair up
          nmi=Math.floor(mi/2);
        } else {
          // drop-in: winner stays in same slot, WB drop feeds as t2
          nmi=mi;
        }
        const ncy=lbTop+16+nmi*nSpacing+nSpacing/2;
        o+=conn(x+MW,cy,x+MW+HGAP,ncy);
      }
    });
  });

  // ── Grand Final ──────────────────────────────────────────────────
  const gfY=gfCy-MH/2;
  o+=`<text x="${gfCol+MW/2}" y="${gfY-12}" text-anchor="middle" fill="${C_WIN}" font-family="Cinzel,serif" font-size="10" letter-spacing="3">GRAND FINAL</text>`;
  o+=matchBox(gf,gfCol,gfY,MW,MH,'clickDE');

  // GF2 — "if necessary", positioned below GF
  const gf2Y=gfY+MH+30;
  o+=`<text x="${gfCol+MW/2}" y="${gf2Y-10}" text-anchor="middle" fill="#3a2a0a" font-family="Cinzel,serif" font-size="9" letter-spacing="2" font-style="italic">if necessary</text>`;
  o+=matchBox(gf2,gfCol,gf2Y,MW,MH,'clickDE');

  // Champion line off GF2
  if(_de.champion){
    o+=hline(gfCol+MW,gfCol+MW+30,gf2Y+MH/2,C_WIN);
    o+=`<text x="${gfCol+MW+36}" y="${gf2Y+MH/2}" dominant-baseline="middle" fill="${C_WIN}" font-family="Cinzel,serif" font-size="11" letter-spacing="2">CHAMPION</text>`;
  }

  // Connectors: WB final → GF t1
  const wbFinRd=wbRounds[nWB-1];
  const wbFinSpan=Math.pow(2,nWB-1);
  const wbFinCy=TOP_WB+wbFinSpan*slotH;
  const wbFinX=LEFT+(nWB-1)*(MW+HGAP)+MW;
  o+=conn(wbFinX,wbFinCy,gfCol,gfCy-MH/4);

  // LB final → GF t2
  const lbFinRd=lbRounds[nLB-1];
  const lbFinSpacing=lbH/lbFinRd.length;
  const lbFinCy=lbTop+16+lbFinSpacing/2;
  const lbFinX=LEFT+(nLB-1)*(MW+HGAP)+MW;
  o+=conn(lbFinX,lbFinCy,gfCol,gfCy+MH/4);

  document.getElementById('bcont').innerHTML=
    `<div class="bwrap"><svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">${o}</svg></div>`;
  setChamp(_de.champion||null);
}
</script>
