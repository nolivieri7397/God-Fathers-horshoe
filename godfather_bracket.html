<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Godfathers Horseshoe Tournament</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#c9a84c;font-family:'Crimson Text',serif;min-height:100vh}
.page{max-width:1500px;margin:0 auto;padding:20px}
header{text-align:center;padding:24px 0 16px;border-bottom:1px solid #2a1f05}
.title-main{font-family:'Cinzel',serif;font-size:38px;font-weight:700;color:#c9a84c;letter-spacing:4px}
.title-sub{font-family:'Cinzel',serif;font-size:11px;letter-spacing:6px;color:#5a4020;margin-top:4px}
.divider{width:180px;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:10px auto}
.tabs{display:flex;border-bottom:1px solid #2a1f05;margin:20px 0 0}
.tab{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;padding:9px 22px;cursor:pointer;border:1px solid transparent;border-bottom:none;color:#5a4020;transition:all .2s}
.tab.active{color:#c9a84c;border-color:#2a1f05;border-bottom-color:#0a0a0a;background:#0d0b04}
.tab:hover:not(.active){color:#a8883c}
.panel{display:none;padding:20px 0}.panel.active{display:block}
.sec{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:#5a4020;margin-bottom:14px}
.row{display:flex;gap:8px;margin-bottom:14px}
input[type=text]{background:#0d0b04;border:1px solid #2a1f05;color:#c9a84c;font-family:'Crimson Text',serif;font-size:16px;padding:7px 11px;flex:1;outline:none}
input[type=text]:focus{border-color:#7a6030}
input[type=text]::placeholder{color:#2a1f05}
.btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:7px 18px;cursor:pointer;border:1px solid #c9a84c;background:transparent;color:#c9a84c;transition:all .2s;white-space:nowrap}
.btn:hover{background:#c9a84c;color:#0a0a0a}
.btn.sb{border-color:#2a1f05;color:#5a4020}.btn.sb:hover{border-color:#5a4020;color:#a8883c;background:transparent}
.btn.rb{border-color:#4a1a1a;color:#7a3030}.btn.rb:hover{background:#4a1a1a;color:#c9a84c}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;min-height:28px}
.tag{display:flex;align-items:center;gap:5px;background:#0d0b04;border:1px solid #2a1f05;padding:3px 9px;font-size:14px;color:#a8883c}
.tag button{background:none;border:none;color:#3a2a0a;cursor:pointer;font-size:15px;line-height:1}
.tag button:hover{color:#c9a84c}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:14px}
.tc{background:#0d0b04;border:1px solid #2a1f05;padding:9px 12px}
.tc-lbl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:#5a4020;margin-bottom:4px}
.tc-nm{font-size:14px;color:#c9a84c}
.fmt-opts{display:flex;gap:10px;margin-bottom:18px}
.fmt-btn{flex:1;padding:12px;border:1px solid #2a1f05;background:#0d0b04;color:#5a4020;cursor:pointer;text-align:center;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;transition:all .2s}
.fmt-btn.sel{border-color:#c9a84c;color:#c9a84c;background:#140f00}
.fmt-btn:hover:not(.sel){border-color:#3a2a0a;color:#a8883c}
.err{font-size:14px;color:#7a3030;font-style:italic}
#champ{display:none;text-align:center;padding:24px;border:1px solid #c9a84c;margin-bottom:20px;background:#0d0b04}
#champ.show{display:block}
.bwrap{overflow:auto;padding:10px 0}
</style>
</head>
<body>
<div class="page">
<header>
  <div class="title-main">THE GODFATHERS</div>
  <div class="divider"></div>
  <div class="title-sub">HORSESHOE TOURNAMENT</div>
</header>
<div class="tabs">
  <div class="tab active" onclick="showTab('setup')">I. Setup</div>
  <div class="tab" onclick="showTab('teams')">II. Teams</div>
  <div class="tab" onclick="showTab('bracket')">III. Bracket</div>
</div>

<div id="panel-setup" class="panel active">
  <div class="sec">Add Players</div>
  <div class="row">
    <input type="text" id="pinp" placeholder="Player name..." onkeydown="if(event.key==='Enter')addP()">
    <button class="btn" onclick="addP()">Add</button>
  </div>
  <div class="tags" id="ptags"></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">
    <button class="btn sb" onclick="loadSample(4)">4 Teams</button>
    <button class="btn sb" onclick="loadSample(5)">5 Teams</button>
    <button class="btn sb" onclick="loadSample(8)">8 Teams</button>
    <button class="btn rb" onclick="clearP()">Clear All</button>
  </div>
  <div class="sec">Format</div>
  <div class="fmt-opts">
    <div class="fmt-btn sel" id="fmt-se" onclick="setFmt('se')">Single<br>Elimination</div>
    <div class="fmt-btn" id="fmt-de" onclick="setFmt('de')">Double<br>Elimination</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="btn" onclick="goTeams()">Continue to Teams →</button>
    <span class="err" id="smsg"></span>
  </div>
</div>

<div id="panel-teams" class="panel">
  <div class="sec">Teams</div>
  <div class="tgrid" id="tgrid"></div>
  <div style="display:flex;gap:10px;align-items:center;margin-top:6px">
    <button class="btn sb" onclick="doShuffle()">↺ Re-randomize</button>
    <button class="btn" onclick="gen()">Generate Bracket →</button>
    <span class="err" id="tmsg"></span>
  </div>
</div>

<div id="panel-bracket" class="panel">
  <div id="champ">
    <div style="font-family:Cinzel,serif;font-size:11px;letter-spacing:4px;color:#5a4020">Champion</div>
    <div id="cname" style="font-family:Cinzel,serif;font-size:28px;color:#c9a84c;margin:6px 0"></div>
    <div style="font-size:14px;color:#5a4020;font-style:italic">An offer they couldn't refuse.</div>
  </div>
  <div id="bcont"></div>
</div>
</div>

<script>
// ── globals ─────────────────────────────────────────────────────────────────
let players=[], teams=[], fmt='se';
let ALL_M={}, mId=0;

function mkM(t1,t2){
  const m={id:++mId, t1:t1||null, t2:t2||null, winner:null, loser:null, lbl1:'', lbl2:''};
  if(m.t1&&!m.t2){m.winner=m.t1;}
  if(m.t2&&!m.t1){m.winner=m.t2;}
  if(m.winner) m.loser=(m.winner===m.t1)?m.t2:m.t1;
  ALL_M[m.id]=m;
  return m;
}

// ── tabs / setup ─────────────────────────────────────────────────────────────
function showTab(t){
  ['setup','teams','bracket'].forEach((p,i)=>{
    document.getElementById('panel-'+p).classList.toggle('active',p===t);
    document.querySelectorAll('.tab')[i].classList.toggle('active',p===t);
  });
}
function addP(){
  const el=document.getElementById('pinp'),n=el.value.trim();
  if(!n||players.includes(n))return;
  players.push(n);el.value='';renderP();
}
function removeP(i){players.splice(i,1);renderP();}
function renderP(){
  document.getElementById('ptags').innerHTML=
    players.map((p,i)=>`<div class="tag">${p}<button onclick="removeP(${i})">×</button></div>`).join('');
}
function clearP(){players=[];renderP();}
function loadSample(n){
  const nm=['Vito','Michael','Sonny','Fredo','Tom','Carlo','Luca','Peter',
            'Sal','Neri','Clemenza','Barzini','Virgil','Calo','Enzo','Tattaglia'];
  players=nm.slice(0,n*2); renderP();
}
function setFmt(f){
  fmt=f;
  ['se','de'].forEach(x=>document.getElementById('fmt-'+x).classList.toggle('sel',x===f));
}
function goTeams(){
  const msg=document.getElementById('smsg');
  if(players.length<4){msg.textContent='Need at least 4 players.';return;}
  if(players.length%2!==0){msg.textContent='Need even number of players.';return;}
  msg.textContent='';
  doShuffle();showTab('teams');
}
function doShuffle(){
  const s=[...players].sort(()=>Math.random()-.5);
  teams=[];
  for(let i=0;i<s.length;i+=2) teams.push({p1:s[i],p2:s[i+1]});
  document.getElementById('tgrid').innerHTML=teams.map((t,i)=>
    `<div class="tc"><div class="tc-lbl">Team ${i+1}</div><div class="tc-nm">${t.p1} &amp; ${t.p2}</div></div>`
  ).join('');
}
function gen(){
  ALL_M={};mId=0;
  fmt==='de'?buildDE():buildSE();
}

// ── render helpers ────────────────────────────────────────────────────────────
function lbl(t){return t?`${t.p1} & ${t.p2}`:null;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function trunc(s,n){return s&&s.length>n?s.slice(0,n-2)+'…':s;}
function seedOf(t){return t?teams.indexOf(t)+1:null;}
function setChamp(t){
  if(t){document.getElementById('cname').textContent=lbl(t);document.getElementById('champ').classList.add('show');}
  else document.getElementById('champ').classList.remove('show');
}

// ── SVG drawing ───────────────────────────────────────────────────────────────
const MW=178, MH=58, HGAP=50;

function drawMatch(m, x, y, fn){
  const h2=MH/2;
  const w1=m.winner&&m.winner===m.t1, w2=m.winner&&m.winner===m.t2;
  const both=!!(m.t1&&m.t2);
  const s1=seedOf(m.t1), s2=seedOf(m.t2);
  let o='';
  // match number
  o+=`<text x="${x+1}" y="${y-3}" fill="#2d2000" font-family="Cinzel,serif" font-size="9">${m.id}</text>`;
  // top slot
  o+=`<g style="cursor:${both?'pointer':'default'}" onclick="${both?fn+'('+m.id+',1)':''}">`;
  o+=`<rect x="${x}" y="${y}" width="${MW}" height="${h2}" fill="${w1?'#1e1600':'#0d0b04'}" stroke="${w1?'#c9a84c':'#2a1f05'}" stroke-width="${w1?1.5:1}"/>`;
  if(s1!=null) o+=`<text x="${x+5}" y="${y+h2/2}" dominant-baseline="middle" fill="#5a4020" font-family="Cinzel,serif" font-size="10">${s1}</text>`;
  const tx1=lbl(m.t1)?esc(trunc(lbl(m.t1),22)):`<tspan font-style="italic" fill="#2a1f05">${esc(m.lbl1||'—')}</tspan>`;
  o+=`<text x="${x+(s1!=null?17:7)}" y="${y+h2/2}" dominant-baseline="middle" fill="${w1?'#c9a84c':both?'#a8883c':'#2a1f05'}" font-size="13">${tx1}</text>`;
  o+='</g>';
  // divider
  o+=`<line x1="${x}" y1="${y+h2}" x2="${x+MW}" y2="${y+h2}" stroke="#1a1200" stroke-width="1"/>`;
  // bottom slot
  o+=`<g style="cursor:${both?'pointer':'default'}" onclick="${both?fn+'('+m.id+',2)':''}">`;
  o+=`<rect x="${x}" y="${y+h2}" width="${MW}" height="${h2}" fill="${w2?'#1e1600':'#0d0b04'}" stroke="${w2?'#c9a84c':'#2a1f05'}" stroke-width="${w2?1.5:1}"/>`;
  if(s2!=null) o+=`<text x="${x+5}" y="${y+h2*1.5}" dominant-baseline="middle" fill="#5a4020" font-family="Cinzel,serif" font-size="10">${s2}</text>`;
  const tx2=lbl(m.t2)?esc(trunc(lbl(m.t2),22)):`<tspan font-style="italic" fill="#2a1f05">${esc(m.lbl2||'—')}</tspan>`;
  o+=`<text x="${x+(s2!=null?17:7)}" y="${y+h2*1.5}" dominant-baseline="middle" fill="${w2?'#c9a84c':both?'#a8883c':'#2a1f05'}" font-size="13">${tx2}</text>`;
  o+='</g>';
  return o;
}

// L-shaped connector: from right-center of match at (rx,cy) to left of target at (tx,ty)
function conn(rx,cy,tx,ty){
  const midX=rx+HGAP/2;
  return `<polyline points="${rx},${cy} ${midX},${cy} ${midX},${ty} ${tx},${ty}" fill="none" stroke="#2a1f05" stroke-width="1.5"/>`;
}
function hline(x1,x2,y,c){return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${c||'#2a1f05'}" stroke-width="1.5"/>`;}
function sLabel(t,x,y){return `<text x="${x}" y="${y}" fill="#5a4020" font-family="Cinzel,serif" font-size="10" letter-spacing="3">${t}</text>`;}
function rLabel(t,x,y){return `<text x="${x}" y="${y}" text-anchor="middle" fill="#2a1f05" font-family="Cinzel,serif" font-size="9" letter-spacing="2">${t}</text>`;}

// ═══════════════════════════════════════════════════════════════════════════════
// SINGLE ELIMINATION
// ═══════════════════════════════════════════════════════════════════════════════
let SE={};

function buildSE(){
  SE={rounds:[]};
  const nR=Math.ceil(Math.log2(teams.length));
  const size=Math.pow(2,nR);
  // Randomly assign byes: shuffle then pad with nulls
  const seeded=[...teams].sort(()=>Math.random()-.5);
  while(seeded.length<size) seeded.splice(Math.floor(Math.random()*(seeded.length+1)),0,null);

  // R0
  const r0=[];
  for(let i=0;i<size;i+=2){
    const m=mkM(seeded[i],seeded[i+1]);
    r0.push(m);
  }
  SE.rounds.push(r0);

  for(let r=1;r<nR;r++){
    const prev=SE.rounds[r-1],cur=[];
    for(let i=0;i<prev.length;i+=2){
      const m=mkM(null,null);
      m.srcIds=[prev[i].id, prev[i+1]?prev[i+1].id:null];
      m.lbl1=`Winner of ${prev[i].id}`;
      m.lbl2=prev[i+1]?`Winner of ${prev[i+1].id}`:'—';
      cur.push(m);
    }
    SE.rounds.push(cur);
  }
  propagateSE();showTab('bracket');renderSE();
}

function propagateSE(){
  SE.rounds.slice(1).forEach(rd=>rd.forEach(m=>{
    const [id1,id2]=m.srcIds||[];
    const s1=ALL_M[id1],s2=id2?ALL_M[id2]:null;
    const nt1=s1?s1.winner:null,nt2=s2?s2.winner:null;
    if(m.winner&&(m.winner!==nt1&&m.winner!==nt2))m.winner=null;
    m.t1=nt1;m.t2=nt2;
    if(m.t1&&!m.t2)m.winner=m.t1;
    if(m.t2&&!m.t1)m.winner=m.t2;
  }));
  SE.champ=SE.rounds[SE.rounds.length-1][0].winner;
}

function clickSE(id,side){
  const m=ALL_M[id];if(!m||!m.t1||!m.t2)return;
  m.winner=side===1?m.t1:m.t2;
  m.loser=side===1?m.t2:m.t1;
  propagateSE();renderSE();
}

function renderSE(){
  const rds=SE.rounds,nR=rds.length;
  const TOP=52,LEFT=30;
  const nSlots=rds[0].length;
  const slotH=MH+32;
  const svgW=LEFT+nR*(MW+HGAP)+140;
  const svgH=TOP+nSlots*slotH+30;
  const rdNames=getRdNames(nR);
  let o='';
  rds.forEach((rd,ri)=>{
    const x=LEFT+ri*(MW+HGAP);
    o+=rLabel(rdNames[ri],x+MW/2,TOP-10);
    const span=Math.pow(2,ri);
    rd.forEach((m,mi)=>{
      const cy=TOP+(mi*span*2+span)*slotH;
      const y=cy-MH/2;
      o+=drawMatch(m,x,y,'clickSE');
      if(ri<nR-1){
        const ns=Math.pow(2,ri+1);
        const ncy=TOP+(Math.floor(mi/2)*ns*2+ns)*slotH;
        o+=conn(x+MW,cy,x+MW+HGAP,ncy);
      }
    });
  });
  const fin=rds[nR-1][0];
  const finSpan=Math.pow(2,nR-1);
  const finCy=TOP+finSpan*slotH;
  const finX=LEFT+(nR-1)*(MW+HGAP)+MW;
  if(SE.champ){
    o+=hline(finX,finX+28,finCy,'#c9a84c');
    o+=`<text x="${finX+34}" y="${finCy}" dominant-baseline="middle" fill="#c9a84c" font-family="Cinzel,serif" font-size="11" letter-spacing="2">CHAMPION</text>`;
  }
  document.getElementById('bcont').innerHTML=
    `<div class="bwrap"><svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">${o}</svg></div>`;
  setChamp(SE.champ||null);
}

function getRdNames(n){
  return Array.from({length:n},(_,i)=>{
    const r=n-i;
    return r===1?'FINAL':r===2?'SEMIFINAL':r===3?'QUARTERFINAL':`ROUND ${i+1}`;
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// DOUBLE ELIMINATION
// ═══════════════════════════════════════════════════════════════════════════════
let DE={};

function buildDE(){
  DE={};
  const nR=Math.ceil(Math.log2(teams.length));
  const size=Math.pow(2,nR);

  // Randomly distribute byes
  const seeded=[...teams].sort(()=>Math.random()-.5);
  while(seeded.length<size) seeded.splice(Math.floor(Math.random()*(seeded.length+1)),0,null);

  // ── Build WB ────────────────────────────────────────────────────
  const wbR=[];
  const wbR0=[];
  for(let i=0;i<size;i+=2) wbR0.push(mkM(seeded[i],seeded[i+1]));
  wbR.push(wbR0);
  for(let r=1;r<nR;r++){
    const prev=wbR[r-1],cur=[];
    for(let i=0;i<prev.length;i+=2){
      const m=mkM(null,null);
      m.srcIds=[prev[i].id,prev[i+1]?prev[i+1].id:null];
      m.lbl1=`Winner of ${prev[i].id}`;
      m.lbl2=prev[i+1]?`Winner of ${prev[i+1].id}`:'—';
      cur.push(m);
    }
    wbR.push(cur);
  }

  // ── Build LB ────────────────────────────────────────────────────
  // 2*(nR-1) LB rounds total.
  // LB round 0      : drop-in (WB R1 losers, cross-seeded)
  // LB round 1      : consolidation (LB R0 winners vs each other)
  // LB round 2      : drop-in (WB R2 losers vs LB R1 winners)
  // LB round 3      : consolidation
  // ...
  const lbR=[];
  const nLBR=2*(nR-1);
  for(let r=0;r<nLBR;r++){
    const cnt=Math.max(1, size/Math.pow(2, Math.floor(r/2)+2));
    const cur=[];
    for(let i=0;i<cnt;i++) cur.push(mkM(null,null));
    lbR.push(cur);
  }

  // GF
  const gf1=mkM(null,null);
  const gf2=mkM(null,null);

  DE={wbR,lbR,gf1,gf2,nR,size,champ:null};
  propagateDE();
  showTab('bracket');
  renderDE();
}

function setM(m,t1,t2){
  // Update teams; reset winner if it's no longer valid
  if(m.t1===t1&&m.t2===t2) return;
  m.t1=t1||null; m.t2=t2||null;
  if(m.winner&&(m.winner!==m.t1&&m.winner!==m.t2)) m.winner=null;
  if(m.t1&&!m.t2){m.winner=m.t1;}
  if(m.t2&&!m.t1){m.winner=m.t2;}
  if(m.winner) m.loser=(m.winner===m.t1)?m.t2:m.t1; else m.loser=null;
}

function propagateDE(){
  const{wbR,lbR,gf1,gf2,nR,size}=DE;

  // WB
  for(let r=1;r<wbR.length;r++){
    wbR[r].forEach(m=>{
      const [id1,id2]=m.srcIds||[];
      setM(m, id1?ALL_M[id1].winner:null, id2?ALL_M[id2].winner:null);
    });
  }
  // Recompute WB losers (after propagation)
  wbR.forEach(rd=>rd.forEach(m=>{
    if(m.winner) m.loser=(m.winner===m.t1)?m.t2:m.t1;
  }));

  // LB R0: cross-seed WB R1 losers
  // For size S, WB R1 has S/2 matches → LB R0 has S/4 matches
  // Pairing: match i gets top-half loser[i] vs bottom-half loser[mirrored]
  // e.g. 8 teams: WB R1 = [m1,m2,m3,m4], LB R0 = [la,lb]
  //   la: loser(m4) vs loser(m1)
  //   lb: loser(m3) vs loser(m2)
  const wbR1=wbR[0];
  const half=wbR1.length/2;
  lbR[0].forEach((m,i)=>{
    const top=wbR1[i];
    const bot=wbR1[wbR1.length-1-i];
    m.lbl1=bot?`Loser of ${bot.id}`:'—';
    m.lbl2=top?`Loser of ${top.id}`:'—';
    setM(m, bot?bot.loser:null, top?top.loser:null);
  });

  // LB R1+
  for(let r=1;r<lbR.length;r++){
    const prev=lbR[r-1];
    const isDropIn=(r%2===0);
    if(!isDropIn){
      // Consolidation: pair up previous LB round winners
      // If same count: each match[i] = prev[i*2].winner vs prev[i*2+1].winner
      // If same count as prev (drop-in case): match[i] = prev[i].winner vs wbDrop[i].loser
      // Wait — odd rounds are consolidation of SAME count as prev (WB dropped in as t2 last round)
      // So: each match[i].t1 = prev[i].winner, .t2 = wbDrop.loser
      const wbDrop=wbR[Math.ceil(r/2)];
      lbR[r].forEach((m,i)=>{
        const p=prev[i];
        const wd=wbDrop?wbDrop[i]:null;
        m.lbl1=p?`Winner of ${p.id}`:'—';
        m.lbl2=wd?`Loser of ${wd.id}`:'—';
        setM(m, p?p.winner:null, wd?wd.loser:null);
      });
    } else {
      // Drop-in consolidation: pair prev LB winners together (count halves)
      lbR[r].forEach((m,i)=>{
        const p1=prev[i*2],p2=prev[i*2+1];
        m.lbl1=p1?`Winner of ${p1.id}`:'—';
        m.lbl2=p2?`Winner of ${p2.id}`:'—';
        setM(m, p1?p1.winner:null, p2?p2.winner:null);
      });
    }
  }

  // GF1: WB winner vs LB winner
  const wbFin=wbR[wbR.length-1][0];
  const lbFin=lbR[lbR.length-1][0];
  gf1.lbl1=`Winner of ${wbFin.id}`;
  gf1.lbl2=`Winner of ${lbFin.id}`;
  setM(gf1, wbFin.winner, lbFin.winner);

  // GF2 (if necessary): only if LB winner beats WB winner in GF1
  const gf2t1=gf1.winner||null;
  const gf2t2=(gf1.t1&&gf1.t2&&gf1.winner)?
    (gf1.winner===gf1.t1?gf1.t2:gf1.t1):null;
  gf2.lbl1=gf1.winner?`Winner of ${gf1.id}`:'—';
  gf2.lbl2='If necessary';
  setM(gf2, gf2t1, gf2t2);

  // Champion: WB winner wins GF1 → instant champ; else GF2 winner
  DE.champ = (gf1.winner&&gf1.winner===gf1.t1) ? gf1.winner : gf2.winner;
}

function clickDE(id,side){
  const m=ALL_M[id];
  if(!m||!m.t1||!m.t2)return;
  m.winner=side===1?m.t1:m.t2;
  m.loser=side===1?m.t2:m.t1;
  propagateDE();renderDE();
}

function renderDE(){
  const{wbR,lbR,gf1,gf2,nR}=DE;
  const TOP=55, LEFT=30;
  const WB_SLOT=MH+30; // vertical slot height in WB
  const LB_SLOT=MH+26; // vertical slot height in LB

  const nWBSlots=wbR[0].length;
  const wbH=nWBSlots*WB_SLOT;
  const LB_TOP=TOP+wbH+72;

  const nLBSlots=lbR[0].length;
  const lbH=nLBSlots*LB_SLOT;

  const nCols=Math.max(wbR.length, lbR.length);
  const GF_COL=LEFT+nCols*(MW+HGAP)+10;

  // GF vertically centered between WB midpoint and LB midpoint
  const wbMid=TOP+wbH/2;
  const lbMid=LB_TOP+lbH/2;
  const GF1_CY=(wbMid+lbMid)/2;
  const GF1_Y=GF1_CY-MH/2;
  const GF2_Y=GF1_Y+MH+40;

  const svgW=GF_COL+MW+180;
  const svgH=LB_TOP+lbH+50;
  const rdNames=getRdNames(wbR.length);

  let o='';

  // ── Section labels ──────────────────────────────────────────────
  o+=sLabel('WINNERS BRACKET',LEFT,TOP-28);
  o+=sLabel('LOSERS BRACKET',LEFT,LB_TOP-22);

  // ── WB ──────────────────────────────────────────────────────────
  wbR.forEach((rd,ri)=>{
    const x=LEFT+ri*(MW+HGAP);
    o+=rLabel(rdNames[ri],x+MW/2,TOP-10);
    const span=Math.pow(2,ri);
    rd.forEach((m,mi)=>{
      // Center-Y for this match within WB grid
      const cy=TOP+(mi*span*2+span)*WB_SLOT;
      const y=cy-MH/2;
      o+=drawMatch(m,x,y,'clickDE');
      if(ri<wbR.length-1){
        const ns=Math.pow(2,ri+1);
        const ncy=TOP+(Math.floor(mi/2)*ns*2+ns)*WB_SLOT;
        o+=conn(x+MW,cy,x+MW+HGAP,ncy);
      }
    });
  });
  o+=rLabel('FINAL',GF_COL+MW/2,TOP-10);

  // WB Final → GF1 (top slot)
  const wbFinSpan=Math.pow(2,wbR.length-1);
  const wbFinCy=TOP+wbFinSpan*WB_SLOT;
  const wbFinX=LEFT+(wbR.length-1)*(MW+HGAP)+MW;
  o+=conn(wbFinX,wbFinCy,GF_COL,GF1_CY-MH/4);

  // ── LB ──────────────────────────────────────────────────────────
  lbR.forEach((rd,ri)=>{
    const x=LEFT+ri*(MW+HGAP);
    o+=rLabel(`LB R${ri+1}`,x+MW/2,LB_TOP-8);
    const spacing=lbH/rd.length;
    rd.forEach((m,mi)=>{
      const cy=LB_TOP+mi*spacing+spacing/2;
      const y=cy-MH/2;
      o+=drawMatch(m,x,y,'clickDE');
      if(ri<lbR.length-1){
        const nextRd=lbR[ri+1];
        const nSpacing=lbH/nextRd.length;
        // Determine target index in next round
        let nmi;
        const isDropIn=(ri%2===0); // current round is drop-in
        if(isDropIn){
          // next round is consolidation (same count) → same index
          nmi=mi;
        } else {
          // next round halves → floor(mi/2)
          nmi=Math.floor(mi/2);
        }
        const ncy=LB_TOP+nmi*nSpacing+nSpacing/2;
        o+=conn(x+MW,cy,x+MW+HGAP,ncy);
      }
    });
  });

  // LB Final → GF1 (bottom slot)
  const lbFinX=LEFT+(lbR.length-1)*(MW+HGAP)+MW;
  const lbFinSpacing=lbH/lbR[lbR.length-1].length;
  const lbFinCy=LB_TOP+lbFinSpacing/2;
  o+=conn(lbFinX,lbFinCy,GF_COL,GF1_CY+MH/4);

  // ── Grand Final ─────────────────────────────────────────────────
  o+=`<text x="${GF_COL+MW/2}" y="${GF1_Y-14}" text-anchor="middle" fill="#c9a84c" font-family="Cinzel,serif" font-size="10" letter-spacing="3">GRAND FINAL</text>`;
  o+=drawMatch(gf1,GF_COL,GF1_Y,'clickDE');
  o+=`<text x="${GF_COL+MW/2}" y="${GF2_Y-10}" text-anchor="middle" fill="#2d2000" font-family="Cinzel,serif" font-size="9" letter-spacing="2" font-style="italic">if necessary</text>`;
  o+=drawMatch(gf2,GF_COL,GF2_Y,'clickDE');

  // Champion
  if(DE.champ){
    const champCy=DE.champ===gf2.winner ? GF2_Y+MH/2 : GF1_Y+MH/2;
    o+=hline(GF_COL+MW,GF_COL+MW+28,champCy,'#c9a84c');
    o+=`<text x="${GF_COL+MW+34}" y="${champCy}" dominant-baseline="middle" fill="#c9a84c" font-family="Cinzel,serif" font-size="11" letter-spacing="2">CHAMPION</text>`;
  }

  document.getElementById('bcont').innerHTML=
    `<div class="bwrap"><svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">${o}</svg></div>`;
  setChamp(DE.champ||null);
}
</script>
